name: Test

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          # Path to dependency files for caching
          cache-dependency-path: 'go.sum'

      - name: Build
        run: make build

      - name: Test
        run: make test
