name: Devcontainer

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: devcontainer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Always runs: shellcheck + devcontainer CLI config validation. Cheap (~30s).
  static:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Shellcheck devcontainer scripts
        # shellcheck is preinstalled on ubuntu-latest runners.
        run: shellcheck -x $(find .devcontainer -type f -name '*.sh' | sort)

      - name: Validate devcontainer.json (read-configuration)
        run: npx -y @devcontainers/cli read-configuration --workspace-folder . > /dev/null

  # Smoke (path-filtered). Mirrors devcontainers/templates/test-pr.yaml: install
  # the CLI once, devcontainer up + exec, explicit cleanup. No GHCR caching —
  # accept ~5–10 min cold builds in exchange for less moving parts.
  smoke:
    runs-on: ubuntu-latest
    needs: static
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            devcontainer:
              - '.devcontainer/**'
              - '.github/workflows/devcontainer.yml'

      - name: Install devcontainer CLI
        if: steps.changes.outputs.devcontainer == 'true'
        run: npm install -g @devcontainers/cli

      - name: Build devcontainer
        if: steps.changes.outputs.devcontainer == 'true'
        run: devcontainer up --id-label test=devcontainer --workspace-folder .

      - name: Run in-container checks
        if: steps.changes.outputs.devcontainer == 'true'
        run: devcontainer exec --workspace-folder . --id-label test=devcontainer bash .devcontainer/test/test.sh

      - name: Cleanup
        if: always() && steps.changes.outputs.devcontainer == 'true'
        run: docker rm -f $(docker container ls -f "label=test=devcontainer" -aq) || true
