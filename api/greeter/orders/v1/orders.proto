syntax = "proto3";

package orders.v1;

import "google/api/annotations.proto";

option go_package = "greeter/api/greeter/orders/v1;v1";
option java_multiple_files = true;
option java_package = "dev.kratos.api.orders.v1";
option java_outer_classname = "OrdersProtoV1";

// Orders demonstrates Dapr Workflow orchestration: schedule an instance and
// poll its runtime state.
service Orders {
  rpc StartOrder (StartOrderRequest) returns (StartOrderReply) {
    option (google.api.http) = {
      post: "/v1/orders"
      body: "*"
    };
  }

  rpc GetOrder (GetOrderRequest) returns (GetOrderReply) {
    option (google.api.http) = {
      get: "/v1/orders/{instance_id}"
    };
  }
}

message StartOrderRequest {
  string item_name = 1;
  double total_cost = 2;
}

message StartOrderReply {
  string instance_id = 1;
}

message GetOrderRequest {
  string instance_id = 1;
}

message GetOrderReply {
  string instance_id = 1;
  // RUNNING, COMPLETED, FAILED, TERMINATED, etc.
  string runtime_status = 2;
  string output = 3;
}
